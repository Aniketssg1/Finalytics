# Server Configuration
server.port=8083
server.servlet.session.persistent=false
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
spring.application.name=account-service

# Logging
logging.level.com.futurebank=DEBUG

# Database Configuration (use environment variables in production)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/AccountServiceDB0002?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:admin}

# JPA Properties
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# Spring Security
spring.main.allow-bean-definition-overriding=true

# JWT Configuration
app.jwtSecret=${JWT_SECRET:defaultDevSecretKeyThatShouldBeChangedInProduction2024!}
app.jwtExpirationMs=${JWT_EXPIRATION_MS:86400000}

# CORS Configuration
cors.allowedOrigins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
cors.allowedMethods=GET,POST,PUT,DELETE,OPTIONS
cors.allowedHeaders=Authorization,Cache-Control,Content-Type
cors.allowCredentials=true
cors.maxAge=3600
